<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS OB Golf Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green-900: #1a3a2a;
  --green-800: #234d38;
  --green-700: #2d6147;
  --green-600: #378056;
  --green-500: #45a068;
  --green-400: #6bc088;
  --green-300: #a3dbb5;
  --green-200: #d0f0db;
  --green-100: #eaf8ef;
  --green-50: #f5fcf7;
  --gold-500: #c8a84e;
  --gold-400: #d4b962;
  --gold-300: #e0ca7a;
  --gold-200: #f0e2a8;
  --gold-100: #faf4d8;
  --sand-100: #faf8f3;
  --sand-200: #f2ede3;
  --sand-300: #e8e0d0;
  --charcoal: #2c2c2c;
  --text-primary: #1a1a1a;
  --text-secondary: #5a5a5a;
  --text-muted: #8a8a8a;
  --white: #ffffff;
  --red-500: #d94452;
  --red-100: #fde8ea;
  --blue-500: #3b82f6;
  --blue-100: #dbeafe;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --shadow-xl: 0 20px 60px rgba(0,0,0,0.15);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--sand-100);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, var(--green-900) 0%, var(--green-700) 100%);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-lg);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 44px;
  height: 44px;
  background: var(--gold-500);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 2px 8px rgba(200,168,78,0.4);
}

.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.5px;
}

.logo-sub {
  font-size: 11px;
  color: var(--green-300);
  font-weight: 400;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.admin-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
}

.admin-btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--green-200);
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.admin-btn:hover { background: rgba(255,255,255,0.2); }
.admin-btn.active { background: var(--gold-500); color: var(--green-900); border-color: var(--gold-500); font-weight: 600; }

/* ── Navigation ── */
.nav-bar {
  display: flex;
  gap: 2px;
  padding: 0 24px 0;
  max-width: 1200px;
  margin: 0 auto;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.nav-bar::-webkit-scrollbar { display: none; }

.nav-item {
  padding: 12px 18px;
  color: var(--green-300);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  position: relative;
}

.nav-item:hover { color: var(--white); }
.nav-item.active {
  color: var(--white);
  border-bottom-color: var(--gold-500);
  font-weight: 600;
}

/* ── Main Content ── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Cards ── */
.card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(0,0,0,0.04);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--green-900);
}

.card-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ── Dashboard Stats ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--white);
  border-radius: var(--radius-md);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(0,0,0,0.04);
  display: flex;
  align-items: center;
  gap: 16px;
}

.stat-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.stat-icon.members { background: var(--green-100); }
.stat-icon.rounds { background: var(--blue-100); }
.stat-icon.finance { background: var(--gold-100); }
.stat-icon.schedule { background: var(--red-100); }

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 500;
  color: var(--green-900);
}

.stat-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ── Tables ── */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th {
  background: var(--green-50);
  color: var(--green-800);
  font-weight: 600;
  text-align: left;
  padding: 12px 16px;
  border-bottom: 2px solid var(--green-200);
  white-space: nowrap;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--sand-200);
  vertical-align: middle;
}

tr:hover td { background: var(--green-50); }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
}

.badge-green { background: var(--green-100); color: var(--green-700); }
.badge-gold { background: var(--gold-100); color: #8b6914; }
.badge-red { background: var(--red-100); color: var(--red-500); }
.badge-blue { background: var(--blue-100); color: var(--blue-500); }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--green-700);
  color: var(--white);
}

.btn-primary:hover { background: var(--green-800); }

.btn-secondary {
  background: var(--sand-200);
  color: var(--text-primary);
}

.btn-secondary:hover { background: var(--sand-300); }

.btn-danger {
  background: var(--red-100);
  color: var(--red-500);
}

.btn-danger:hover { background: #fbd0d5; }

.btn-sm { padding: 6px 12px; font-size: 13px; }

.btn-icon {
  width: 32px;
  height: 32px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
}

.btn-icon:hover { background: var(--sand-200); color: var(--text-primary); }

.admin-only { display: none !important; }
body.admin-mode .admin-only { display: inline-flex !important; }

/* ── Forms / Modals ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}

.modal {
  background: var(--white);
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 560px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-xl);
}

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--sand-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--white);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  z-index: 1;
}

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--green-900);
}

.modal-body { padding: 24px; }

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--sand-200);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--sand-300);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--white);
  transition: border-color 0.2s;
  color: var(--text-primary);
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--green-500);
  box-shadow: 0 0 0 3px rgba(69,160,104,0.12);
}

.form-textarea { resize: vertical; min-height: 80px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ── Receipt / Image Upload ── */
.receipt-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.receipt-card {
  background: var(--white);
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(0,0,0,0.04);
  transition: transform 0.2s, box-shadow 0.2s;
}

.receipt-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

.receipt-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  background: var(--sand-200);
  cursor: pointer;
}

.receipt-info { padding: 12px; }
.receipt-date { font-size: 12px; color: var(--text-muted); }
.receipt-desc { font-size: 14px; font-weight: 500; margin-top: 4px; }
.receipt-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: var(--green-700);
  margin-top: 4px;
}

/* ── Bylaws ── */
.bylaws-content {
  line-height: 1.9;
  font-size: 15px;
  color: var(--text-primary);
}

.bylaws-content h2 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--green-900);
  margin: 32px 0 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--green-200);
}

.bylaws-content h3 {
  font-size: 16px;
  color: var(--green-800);
  margin: 20px 0 8px;
}

.bylaws-content p { margin-bottom: 8px; }
.bylaws-content ol, .bylaws-content ul { padding-left: 24px; margin-bottom: 12px; }
.bylaws-content li { margin-bottom: 4px; }

/* ── Awards ── */
.awards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.award-card {
  background: linear-gradient(135deg, #fdfbf5 0%, #fff 100%);
  border-radius: var(--radius-md);
  padding: 20px;
  border: 1px solid var(--gold-200);
  position: relative;
  overflow: hidden;
}

.award-card::before {
  content: '';
  position: absolute;
  top: -20px;
  right: -20px;
  width: 80px;
  height: 80px;
  background: var(--gold-100);
  border-radius: 50%;
  opacity: 0.5;
}

.award-icon { font-size: 32px; margin-bottom: 10px; }
.award-title { font-weight: 700; font-size: 16px; color: var(--green-900); }
.award-winner {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--gold-500);
  margin: 6px 0;
}
.award-detail { font-size: 13px; color: var(--text-muted); }

/* ── Password Modal ── */
.pw-input-wrap {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

.pw-input-wrap input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--sand-300);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
}

.pw-error { color: var(--red-500); font-size: 13px; margin-top: 8px; display: none; }

/* ── Image Lightbox ── */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
  animation: fadeIn 0.2s ease;
}

.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 8px;
}

/* ── Schedule Timeline ── */
.timeline { position: relative; padding-left: 32px; }
.timeline::before {
  content: '';
  position: absolute;
  left: 12px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--green-200);
}

.timeline-item {
  position: relative;
  margin-bottom: 24px;
  padding: 16px 20px;
  background: var(--white);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(0,0,0,0.04);
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -26px;
  top: 20px;
  width: 12px;
  height: 12px;
  background: var(--green-500);
  border-radius: 50%;
  border: 2px solid var(--white);
  box-shadow: var(--shadow-sm);
}

.timeline-item.past::before { background: var(--text-muted); }
.timeline-item.upcoming::before { background: var(--gold-500); animation: pulse 2s infinite; }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(200,168,78,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(200,168,78,0); }
}

.timeline-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--green-600);
  font-weight: 500;
}

.timeline-title { font-size: 16px; font-weight: 600; margin-top: 4px; }
.timeline-detail { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.timeline-participants {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}

/* ── Finance Summary ── */
.finance-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.finance-box {
  background: var(--white);
  border-radius: var(--radius-md);
  padding: 16px;
  text-align: center;
  border: 1px solid rgba(0,0,0,0.04);
}

.finance-box-label { font-size: 13px; color: var(--text-muted); }
.finance-box-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 500;
  margin-top: 4px;
}

.finance-box-value.income { color: var(--green-700); }
.finance-box-value.expense { color: var(--red-500); }
.finance-box-value.balance { color: var(--green-900); }

/* ── Scorecard Display ── */
.scorecard-mini {
  display: flex;
  gap: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.hole-score {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  font-weight: 500;
}

.hole-score.birdie { background: #dbeafe; color: #2563eb; }
.hole-score.par { background: var(--sand-200); color: var(--text-secondary); }
.hole-score.bogey { background: #fef3c7; color: #d97706; }
.hole-score.double-plus { background: #fde8ea; color: var(--red-500); }
.hole-score.eagle { background: #d1fae5; color: #059669; }

/* ── Empty State ── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}

.empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state-text { font-size: 15px; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .header-top { padding: 12px 16px; }
  .logo-text { font-size: 18px; }
  .nav-bar { padding: 0 16px; }
  .nav-item { padding: 10px 14px; font-size: 13px; }
  .main { padding: 16px; }
  .card { padding: 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
  .modal { max-width: 100%; max-height: 95vh; border-radius: var(--radius-lg); }
  .finance-summary { grid-template-columns: repeat(2, 1fr); }
  .receipt-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
}

/* ── Scoreboard Highlight ── */
.rank-1 td:first-child::before { content: '🥇 '; }
.rank-2 td:first-child::before { content: '🥈 '; }
.rank-3 td:first-child::before { content: '🥉 '; }

/* ── Tabs inside pages ── */
.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  border-bottom: 2px solid var(--sand-200);
}

.tab-item {
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
}

.tab-item:hover { color: var(--text-primary); }
.tab-item.active { color: var(--green-700); border-bottom-color: var(--green-700); font-weight: 600; }

/* ── Member Avatar ── */
.member-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  flex-shrink: 0;
}

.member-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ── File upload area ── */
.upload-area {
  border: 2px dashed var(--sand-300);
  border-radius: var(--radius-md);
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.upload-area:hover { border-color: var(--green-400); background: var(--green-50); }
.upload-area-icon { font-size: 36px; margin-bottom: 8px; }
.upload-area-text { color: var(--text-muted); font-size: 14px; }

.upload-preview {
  margin-top: 12px;
  max-height: 200px;
  border-radius: var(--radius-sm);
  object-fit: contain;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green-900);
  color: var(--white);
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 500;
  z-index: 400;
  opacity: 0;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- ════════════ HEADER ════════════ -->
<header class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">⛳</div>
      <div>
        <div class="logo-text">DS OB Golf Club</div>
        <div class="logo-sub">EST. 2025 · MEMBER ONLY</div>
      </div>
    </div>
    <div class="admin-toggle">
      <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">
        🔒 <span id="adminLabel">관리자</span>
      </button>

// ── Utility Functions ──
const $ = id => document.getElementById(id);
const qs = sel => document.querySelector(sel);
const qsa = sel => document.querySelectorAll(sel);

function fmt(n) {
  return new Intl.NumberFormat('ko-KR').format(n);
}

function fmtWon(n) {
  return '₩' + fmt(n);
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function getMemberName(mid) {
  const m = DATA.members.find(x => x.id === mid);
  return m ? m.name : '(알 수 없음)';
}

function getMemberColor(mid) {
  const m = DATA.members.find(x => x.id === mid);
  return m ? m.color : '#999';
}

let nextId = (arr) => (arr.length ? Math.max(...arr.map(x => x.id)) + 1 : 1);

function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    document.body.classList.remove('admin-mode');
    $('adminBtn').classList.remove('active');
    $('adminLabel').textContent = '관리자';
    $('adminBtn').innerHTML = '🔒 <span id="adminLabel">관리자</span>';
    showToast('관리자 모드를 종료했습니다');
  } else {
    showPasswordModal();
  }
}

function showPasswordModal() {
  $('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width:380px">
        <div class="modal-header">

            <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()">

          </div>
          <div class="pw-error" id="pwError">비밀번호가 일치하지 않습니다</div>

  setTimeout(() => $('pwInput')?.focus(), 100);
}

function checkPw() {
  const pw = $('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    $('adminBtn').classList.add('active');
    $('adminBtn').innerHTML = '🔓 <span id="adminLabel">관리자 ON</span>';
    closeModal();
    showToast('관리자 모드가 활성화되었습니다');
    renderCurrentPage();
  } else {
    $('pwError').style.display = 'block';
    $('pwInput').value = '';
    $('pwInput').focus();
  }
}

function closeModal() { $('modalContainer').innerHTML = ''; }

      $('page-' + page).classList.add('active');
      currentPage = page;
      renderCurrentPage();
    });
  });

});

        </div>
      </div>
    </div>
  `;

function scoreRowHtml(idx, mid, score) {
  const options = DATA.members.map(m => `<option value="${m.id}" ${m.id==mid?'selected':''}>${m.name}</option>`).join('');
  return `<div class="form-row" style="margin-bottom:8px" data-scorerow>
    <div><select class="form-select score-member">${options}</select></div>
    <div><input class="form-input score-value" type="number" value="${score}" placeholder="스코어"></div>
  </div>`;
}

function addScoreRow() {
  const container = $('scoreRows');
  const div = document.createElement('div');
  div.innerHTML = scoreRowHtml(container.children.length, '', '');
  container.appendChild(div.firstElementChild);
}

function saveRound(id) {
  const date = $('rDate').value;
  const course = $('rCourse').value.trim();
  if (!date || !course) { showToast('날짜와 골프장을 입력하세요'); return; }

  const rows = qsa('[data-scorerow]');
  const scores = [];
  rows.forEach(row => {
    const mid = parseInt(row.querySelector('.score-member').value);
    const score = parseInt(row.querySelector('.score-value').value);
    if (mid && score) scores.push({ mid, score });
  });

  let best = '-';
  if (scores.length) {
    const bestScore = scores.reduce((a,b) => a.score < b.score ? a : b);
    best = `${getMemberName(bestScore.mid)} (${bestScore.score})`;
  }

  const data = { date, course, memo: $('rMemo').value, scores, best };
  
  if (id) {
    const idx = DATA.rounds.findIndex(r => r.id === id);
    DATA.rounds[idx] = { ...DATA.rounds[idx], ...data };
    showToast('라운드가 수정되었습니다');
  } else {
    data.id = nextId(DATA.rounds);
    DATA.rounds.push(data);
    showToast('라운드가 추가되었습니다');
  }
  closeModal();
  renderRounds();
}

function deleteRound(id) {
  if (confirm('이 라운드를 삭제하시겠습니까?')) {
    DATA.rounds = DATA.rounds.filter(r => r.id !== id);
    showToast('라운드가 삭제되었습니다');
    renderRounds();
  }
}

        <button class="btn btn-danger btn-sm" onclick="deleteAward(${a.id})">삭제</button>
      </div>
    </div>
  `).join('');
}

function openAwardModal(award = null) {
  const isEdit = !!award;
  const a = award || { icon:'🏆', title:'', winner:'', detail:'', date:'' };
  $('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${isEdit ? '포상 수정' : '포상 추가'}</div>
          <button class="btn-icon" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">아이콘 (이모지)</label>
              <input class="form-input" id="aIcon" value="${a.icon}" placeholder="🏆">
            </div>
            <div class="form-group">
              <label class="form-label">날짜</label>
              <input class="form-input" id="aDate" type="month" value="${a.date}">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">포상명 *</label>
            <input class="form-input" id="aTitle" value="${a.title}" placeholder="연간 베스트스코어">
          </div>
          <div class="form-group">
            <label class="form-label">수상자 *</label>
            <input class="form-input" id="aWinner" value="${a.winner}" placeholder="이름">
          </div>
          <div class="form-group">
            <label class="form-label">상세</label>
            <input class="form-input" id="aDetail" value="${a.detail}" placeholder="84타 (남서울CC)">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">취소</button>
          <button class="btn btn-primary" onclick="saveAward(${isEdit ? a.id : 'null'})">${isEdit ? '수정' : '추가'}</button>
        </div>
      </div>
    </div>
  `;
}

function saveAward(id) {
  const title = $('aTitle').value.trim();
  const winner = $('aWinner').value.trim();
  if (!title || !winner) { showToast('포상명과 수상자를 입력하세요'); return; }

  const data = { icon: $('aIcon').value || '🏆', title, winner, detail: $('aDetail').value, date: $('aDate').value };
  if (id) {
    const idx = DATA.awards.findIndex(a => a.id === id);
    DATA.awards[idx] = { ...DATA.awards[idx], ...data };
    showToast('포상이 수정되었습니다');
  } else {
    data.id = nextId(DATA.awards);
    DATA.awards.push(data);
    showToast('포상이 추가되었습니다');
  }
  closeModal();
  renderAwards();
}

function editAward(id) { openAwardModal(DATA.awards.find(a => a.id === id)); }
function deleteAward(id) {
  if (confirm('이 포상을 삭제하시겠습니까?')) {
    DATA.awards = DATA.awards.filter(a => a.id !== id);
    showToast('포상이 삭제되었습니다');
    renderAwards();
  }
}

// ══════════════════════
// RECEIPTS
// ══════════════════════
function renderReceipts() {
  if (!DATA.receipts.length) {
    $('receiptGrid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🧾</div><div class="empty-state-text">등록된 영수증이 없습니다</div></div>';
    return;
  }
  $('receiptGrid').innerHTML = DATA.receipts.map(r => `
    <div class="receipt-card">
      ${r.image 
        ? `<img class="receipt-img" src="${r.image}" onclick="openLightbox('${r.image}')" alt="영수증">`
        : `<div class="receipt-img" style="display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--text-muted)">🧾</div>`
      }
      <div class="receipt-info">
        <div class="receipt-date">${r.date}</div>
        <div class="receipt-desc">${r.desc}</div>
        <div class="receipt-amount">${fmtWon(r.amount)}</div>
        ${r.note ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px">${r.note}</div>` : ''}
        <div class="admin-only" style="margin-top:8px;display:flex;gap:4px">
          <button class="btn btn-secondary btn-sm" onclick="editReceipt(${r.id})">수정</button>
          <button class="btn btn-danger btn-sm" onclick="deleteReceipt(${r.id})">삭제</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openReceiptModal(receipt = null) {
  const isEdit = !!receipt;
  const r = receipt || { date:'', desc:'', amount:'', note:'', image:'' };
  $('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${isEdit ? '영수증 수정' : '영수증 추가'}</div>
          <button class="btn-icon" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">날짜 *</label>
              <input class="form-input" id="rcDate" type="date" value="${r.date}">
            </div>
            <div class="form-group">
              <label class="form-label">금액 (원) *</label>
              <input class="form-input" id="rcAmount" type="number" value="${r.amount}">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">내용 *</label>
            <input class="form-input" id="rcDesc" value="${r.desc}" placeholder="지출 내용">
          </div>
          <div class="form-group">
            <label class="form-label">비고</label>
            <input class="form-input" id="rcNote" value="${r.note || ''}" placeholder="메모">
          </div>
          <div class="form-group">
            <label class="form-label">영수증 이미지</label>
            <div class="upload-area" onclick="document.getElementById('rcFile').click()">
              <div class="upload-area-icon">📷</div>
              <div class="upload-area-text">클릭하여 이미지를 선택하세요</div>
              <input type="file" id="rcFile" accept="image/*" style="display:none" onchange="previewReceipt(event)">
            </div>
            <img id="rcPreview" class="upload-preview" style="display:none;width:100%;margin-top:12px">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">취소</button>
          <button class="btn btn-primary" onclick="saveReceipt(${isEdit ? r.id : 'null'})">${isEdit ? '수정' : '추가'}</button>
        </div>
      </div>
    </div>
  `;
  if (r.image) {
    $('rcPreview').src = r.image;
    $('rcPreview').style.display = 'block';
  }
}

let pendingReceiptImage = '';

function previewReceipt(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingReceiptImage = e.target.result;
    $('rcPreview').src = pendingReceiptImage;
    $('rcPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function saveReceipt(id) {
  const date = $('rcDate').value;
  const desc = $('rcDesc').value.trim();
  const amount = parseInt($('rcAmount').value);
  if (!date || !desc || !amount) { showToast('필수 항목을 입력하세요'); return; }

  const data = { date, desc, amount, note: $('rcNote').value, image: pendingReceiptImage || (id ? DATA.receipts.find(r=>r.id===id)?.image : '') || '' };
  if (id) {
    const idx = DATA.receipts.findIndex(r => r.id === id);
    DATA.receipts[idx] = { ...DATA.receipts[idx], ...data };
    showToast('영수증이 수정되었습니다');
  } else {
    data.id = nextId(DATA.receipts);
    DATA.receipts.push(data);
    showToast('영수증이 추가되었습니다');
  }
  pendingReceiptImage = '';
  closeModal();
  renderReceipts();
}

function editReceipt(id) { pendingReceiptImage = ''; openReceiptModal(DATA.receipts.find(r => r.id === id)); }
function deleteReceipt(id) {
  if (confirm('이 영수증을 삭제하시겠습니까?')) {
    DATA.receipts = DATA.receipts.filter(r => r.id !== id);
    showToast('영수증이 삭제되었습니다');
    renderReceipts();
  }
}

function openLightbox(src) {
  $('lightboxContainer').innerHTML = `<div class="lightbox" onclick="closeLightbox()"><img src="${src}"></div>`;
}

function closeLightbox() { $('lightboxContainer').innerHTML = ''; }

// ══════════════════════
// DATA EXPORT / IMPORT
// ══════════════════════
// For GitHub JSON workflow, these helper functions let you export/import data

function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `dsob-golf-data-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('데이터가 내보내기 되었습니다');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const imported = JSON.parse(evt.target.result);
        DATA = imported;
        renderCurrentPage();
        showToast('데이터를 가져왔습니다');
      } catch(err) {
        showToast('올바른 JSON 파일이 아닙니다');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
