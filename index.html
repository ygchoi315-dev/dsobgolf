<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS OB Golf Club 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green-900: #1a3a2a;
  --green-800: #234d38;
  --green-700: #2d6147;
  --green-600: #378056;
  --green-500: #45a068;
  --green-400: #6bc088;
  --green-300: #a3dbb5;
  --green-200: #d0f0db;
  --green-100: #eaf8ef;
  --green-50: #f5fcf7;
  --gold-500: #c8a84e;
  --gold-400: #d4b962;
  --gold-300: #e0ca7a;
  --gold-200: #f0e2a8;
  --gold-100: #faf4d8;
  --sand-100: #faf8f3;
  --sand-200: #f2ede3;
  --sand-300: #e8e0d0;
  --charcoal: #2c2c2c;
  --text-primary: #1a1a1a;
  --text-secondary: #5a5a5a;
  --text-muted: #8a8a8a;
  --white: #ffffff;
  --red-500: #d94452;
  --red-100: #fde8ea;
  --blue-500: #3b82f6;
  --blue-100: #dbeafe;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --shadow-xl: 0 20px 60px rgba(0,0,0,0.15);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--sand-100);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, var(--green-900) 0%, var(--green-700) 100%);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-lg);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 44px;
  height: 44px;
  background: var(--gold-500);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 2px 8px rgba(200,168,78,0.4);
}

.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.5px;
}

.logo-sub {
  font-size: 11px;
  color: var(--green-300);
  font-weight: 400;
  letter-spacing: 2px;
  text-transform: uppercase;
}


/* ── Navigation ── */
.nav-bar {
  display: flex;
  gap: 2px;
  padding: 0 24px 0;
  max-width: 1200px;
  margin: 0 auto;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.nav-bar::-webkit-scrollbar { display: none; }

.nav-item {
  padding: 12px 18px;
  color: var(--green-300);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  position: relative;
}

.nav-item:hover { color: var(--white); }
.nav-item.active {
  color: var(--white);
  border-bottom-color: var(--gold-500);
  font-weight: 600;
}

/* ── Main Content ── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Cards ── */
.card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(0,0,0,0.04);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--green-900);
}

.card-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ── Dashboard Stats ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--white);
  border-radius: var(--radius-md);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(0,0,0,0.04);
  display: flex;
  align-items: center;
  gap: 16px;
}

.stat-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.stat-icon.members { background: var(--green-100); }
.stat-icon.rounds { background: var(--blue-100); }
.stat-icon.finance { background: var(--gold-100); }

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 500;
  color: var(--green-900);
}

.stat-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ── Tables ── */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th {
  background: var(--green-50);
  color: var(--green-800);
  font-weight: 600;
  text-align: left;
  padding: 12px 16px;
  border-bottom: 2px solid var(--green-200);
  white-space: nowrap;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--sand-200);
  vertical-align: middle;
}

tr:hover td { background: var(--green-50); }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
}

.badge-green { background: var(--green-100); color: var(--green-700); }
.badge-gold { background: var(--gold-100); color: #8b6914; }
.badge-red { background: var(--red-100); color: var(--red-500); }
.badge-blue { background: var(--blue-100); color: var(--blue-500); }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--green-700);
  color: var(--white);
}

.btn-primary:hover { background: var(--green-800); }

.btn-secondary {
  background: var(--sand-200);
  color: var(--text-primary);
}

.btn-secondary:hover { background: var(--sand-300); }

.btn-danger {
  background: var(--red-100);
  color: var(--red-500);
}

.btn-danger:hover { background: #fbd0d5; }

.btn-sm { padding: 6px 12px; font-size: 13px; }

.btn-icon {
  width: 32px;
  height: 32px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
}

.btn-icon:hover { background: var(--sand-200); color: var(--text-primary); }


/* ── Forms / Modals ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}

.modal {
  background: var(--white);
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 560px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-xl);
}

.modal.modal-lg { max-width: 720px; }

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--sand-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--white);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  z-index: 1;
}

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--green-900);
}

.modal-body { padding: 24px; }

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--sand-200);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--sand-300);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--white);
  transition: border-color 0.2s;
  color: var(--text-primary);
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--green-500);
  box-shadow: 0 0 0 3px rgba(69,160,104,0.12);
}

.form-textarea { resize: vertical; min-height: 80px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ── Bylaws ── */
.bylaws-content {
  line-height: 1.9;
  font-size: 15px;
  color: var(--text-primary);
}

.bylaws-content h2 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--green-900);
  margin: 32px 0 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--green-200);
}

.bylaws-content h3 {
  font-size: 16px;
  color: var(--green-800);
  margin: 20px 0 8px;
}

.bylaws-content p { margin-bottom: 8px; }
.bylaws-content ol, .bylaws-content ul { padding-left: 24px; margin-bottom: 12px; }
.bylaws-content li { margin-bottom: 4px; }

.bylaws-content .bylaws-account {
  background: var(--gold-100);
  border: 1px solid var(--gold-200);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  margin-bottom: 24px;
  font-size: 15px;
  font-weight: 600;
  color: var(--green-900);
}

/* ── Awards ── */
.awards-month-section { margin-bottom: 32px; }

.awards-month-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--green-900);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--gold-200);
}

.awards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.award-card {
  background: linear-gradient(135deg, #fdfbf5 0%, #fff 100%);
  border-radius: var(--radius-md);
  padding: 20px;
  border: 1px solid var(--gold-200);
  position: relative;
  overflow: hidden;
}

.award-card::before {
  content: '';
  position: absolute;
  top: -20px;
  right: -20px;
  width: 80px;
  height: 80px;
  background: var(--gold-100);
  border-radius: 50%;
  opacity: 0.5;
}

.award-icon { font-size: 32px; margin-bottom: 10px; }
.award-title { font-weight: 700; font-size: 16px; color: var(--green-900); }
.award-winner {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--gold-500);
  margin: 6px 0;
}
.award-detail { font-size: 13px; color: var(--text-muted); }

/* ── Password Modal ── */
.pw-input-wrap {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

.pw-input-wrap input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--sand-300);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
}

.pw-error { color: var(--red-500); font-size: 13px; margin-top: 8px; display: none; }

/* ── Image Lightbox ── */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
  animation: fadeIn 0.2s ease;
}

.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 8px;
}

/* ── Finance Summary ── */
.finance-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.finance-box {
  background: var(--white);
  border-radius: var(--radius-md);
  padding: 16px;
  text-align: center;
  border: 1px solid rgba(0,0,0,0.04);
  box-shadow: var(--shadow-sm);
}

.finance-box-label { font-size: 13px; color: var(--text-muted); }
.finance-box-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 500;
  margin-top: 4px;
}

.finance-box-value.income { color: var(--green-700); }
.finance-box-value.expense { color: var(--red-500); }
.finance-box-value.balance { color: var(--green-900); }

/* ── Receipt ── */
.receipt-thumb {
  width: 48px;
  height: 48px;
  object-fit: cover;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid var(--sand-300);
}

/* ── Empty State ── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}

.empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state-text { font-size: 15px; }

/* ── File upload area ── */
.upload-area {
  border: 2px dashed var(--sand-300);
  border-radius: var(--radius-md);
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.upload-area:hover { border-color: var(--green-400); background: var(--green-50); }
.upload-area-icon { font-size: 36px; margin-bottom: 8px; }
.upload-area-text { color: var(--text-muted); font-size: 14px; }

.upload-preview {
  margin-top: 12px;
  max-height: 200px;
  border-radius: var(--radius-sm);
  object-fit: contain;
}

/* ── Round Detail ── */
.round-detail-row { cursor: pointer; }
.round-detail-row:hover td { background: var(--green-100); }

.round-score-list {
  list-style: none;
  padding: 0;
}
.round-score-list li {
  display: flex;
  justify-content: space-between;
  padding: 8px 16px;
  border-bottom: 1px solid var(--sand-200);
  font-size: 14px;
}
.round-score-list li:last-child { border-bottom: none; }
.round-score-list .score-val {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  color: var(--green-700);
}

/* ── Checkbox list for round scoring ── */
.score-entry-list {
  max-height: 400px;
  overflow-y: auto;
}

.score-entry-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--sand-200);
}

.score-entry-item label {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}

.score-entry-item input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--green-600);
}

.score-entry-item input[type="number"] {
  width: 80px;
  padding: 6px 10px;
  border: 1.5px solid var(--sand-300);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
}

.score-entry-item input[type="number"]:focus {
  outline: none;
  border-color: var(--green-500);
  box-shadow: 0 0 0 3px rgba(69,160,104,0.12);
}

/* ── Member Avatar ── */
.member-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  flex-shrink: 0;
}

.member-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ── Rank ── */
.rank-1 td:first-child::before { content: '\1F947 '; }
.rank-2 td:first-child::before { content: '\1F948 '; }
.rank-3 td:first-child::before { content: '\1F949 '; }

/* ── Tab bar inside pages ── */
.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  border-bottom: 2px solid var(--sand-200);
}

.tab-item {
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
}

.tab-item:hover { color: var(--text-primary); }
.tab-item.active { color: var(--green-700); border-bottom-color: var(--green-700); font-weight: 600; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green-900);
  color: var(--white);
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 500;
  z-index: 400;
  opacity: 0;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── Award entry rows in modal ── */
.award-entry-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}
.award-entry-row input {
  padding: 8px 12px;
  border: 1.5px solid var(--sand-300);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
}
.award-entry-row input:focus {
  outline: none;
  border-color: var(--green-500);
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .header-top { padding: 12px 16px; }
  .logo-text { font-size: 18px; }
  .nav-bar { padding: 0 16px; }
  .nav-item { padding: 10px 14px; font-size: 13px; }
  .main { padding: 16px; }
  .card { padding: 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
  .modal { max-width: 100%; max-height: 95vh; border-radius: var(--radius-lg); }
  .finance-summary { grid-template-columns: repeat(2, 1fr); }
  .finance-box-value { font-size: 18px; }
}

/* ── Companion Matrix ── */
.companion-table { border-collapse: collapse; font-size: 12px; }
.companion-table th, .companion-table td { padding: 6px 8px; text-align: center; border: 1px solid var(--sand-200); min-width: 40px; }
.companion-table th { background: var(--green-50); color: var(--green-800); font-size: 11px; white-space: nowrap; }
.companion-table th.row-header { text-align: left; font-size: 13px; }
.companion-table td.self { background: var(--sand-200); color: var(--text-muted); }
.companion-table td.count { font-family: 'JetBrains Mono', monospace; font-weight: 500; }
.companion-table td.count-high { background: var(--green-100); color: var(--green-700); font-weight: 700; }
.companion-table td.total-col { background: var(--gold-100); font-weight: 700; color: var(--green-900); }
@media (max-width: 768px) {
  .companion-table { font-size: 11px; }
  .companion-table th, .companion-table td { padding: 4px 5px; min-width: 32px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">&#9971;</div>
      <div>
        <div class="logo-text">DS OB Golf Club</div>
        <div class="logo-sub">2026 &middot; MEMBER ONLY</div>
      </div>
    </div>
  </div>
  <nav class="nav-bar" id="navBar">
    <div class="nav-item active" data-page="dashboard">&#45824;&#49884;&#48372;&#46300;</div>

// ── Data Management ──
let DATA;
let _savingToSupabase = false;

// Supabase에서 데이터 불러오기 (비동기)
async function loadDataFromSupabase() {
  if (!supabase) return null;
  try {
    const { data, error } = await supabase
      .from('app_data')
      .select('data')
      .eq('id', 1)
      .single();
    if (error) {
      if (error.code === 'PGRST116') return null; // row not found
      console.error('Supabase load error:', error);
      return null;
    }
    return data?.data || null;
  } catch(e) {
    console.error('Supabase load exception:', e);
    return null;
  }
}

// Supabase에 데이터 저장 (비동기)
async function saveDataToSupabase() {
  if (!supabase || _savingToSupabase) return;
  _savingToSupabase = true;
  try {
    const { error } = await supabase
      .from('app_data')
      .upsert({ id: 1, data: DATA, updated_at: new Date().toISOString() });
    if (error) {
      console.error('Supabase save error:', error);
      showToast('서버 저장 실패. 로컬에만 저장됨.');
    }
  } catch(e) {
    console.error('Supabase save exception:', e);
  } finally {
    _savingToSupabase = false;
  }
}

function loadData() {
  try {
    const savedVersion = parseInt(localStorage.getItem(STORAGE_KEY + '_ver')) || 0;
    if (savedVersion >= DATA_VERSION) {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        DATA = JSON.parse(saved);
        return;
      }
    }
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_KEY + '_version');
    DATA = getDefaultData();
    saveDataLocal();
  } catch(e) {
    DATA = getDefaultData();
    saveDataLocal();
  }
}

function saveDataLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    localStorage.setItem(STORAGE_KEY + '_ver', DATA_VERSION);
  } catch(e) {
    showToast('저장 공간이 부족합니다');
  }
}

function saveData() {
  saveDataLocal();
  if (SUPABASE_ENABLED) {
    saveDataToSupabase();
  }
}

function resetData() {
  if (confirm('모든 데이터를 초기값으로 되돌리시겠습니까?')) {
    DATA = getDefaultData();
    saveData();
    renderAll();
    showToast('데이터가 초기화되었습니다');
  }
}

// ── Next ID helper ──
function nextId(arr) {
  return arr.length > 0 ? Math.max(...arr.map(x => x.id)) + 1 : 1;
}

// ── Format helpers ──
function fmt(n) {
  if (n == null) return '-';
  return Number(n).toLocaleString('ko-KR');
}

function fmtDate(d) {
  if (!d) return '-';
  if (d.length <= 7) return d; // YYYY-MM format
  const parts = d.split('-');
  return parts[0] + '-' + parts[1] + '-' + parts[2];
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function renderAll() {

  renderMembers();
  renderRounds();
  renderFinance();
  renderAwards();
  renderCompanion();
  renderBylaws();
  renderContacts();
}

// ── Dashboard ──
function renderDashboard() {
  const totalMembers = DATA.members.length;
  const totalDeposits = DATA.deposits.reduce((s,d) => s + d.amount, 0);
  const totalExpenses = DATA.expenses.reduce((s,e) => s + e.amount, 0);
  const balance = totalDeposits - totalExpenses;

  // 최근 월 챔피언 (가장 최근 라운드의 베스트 스코어)
  const sortedRounds = [...DATA.rounds].sort((a,b) => b.date.localeCompare(a.date));
  let champText = '-';
  if (sortedRounds.length > 0) {
    const latest = sortedRounds[0];
    const best = [...latest.scores].sort((a,b) => a.score - b.score)[0];
    if (best) champText = best.name + ' (' + best.score + ')';
  }

  document.getElementById('dashStats').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon members">&#9971;</div>
      <div>
        <div class="stat-value">${totalMembers}</div>
        <div class="stat-label">전체 멤버</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon rounds" style="background:var(--gold-100)">&#127942;</div>
      <div>
        <div class="stat-value" style="font-size:20px">${champText}</div>
        <div class="stat-label">최근월 챔피언</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon finance">&#128176;</div>
      <div>
        <div class="stat-value">${fmt(balance)}</div>
        <div class="stat-label">잔여 회비</div>
      </div>
    </div>`;

  // Recent 3 rounds
  const recent = sortedRounds.slice(0, 3);
  if (recent.length === 0) {
    document.getElementById('dashRecentRounds').innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#127948;</div><div class="empty-state-text">라운드 기록이 없습니다</div></div>';
    return;
  }
  let html = '<table><thead><tr><th>날짜</th><th>차수</th><th>골프장</th><th>참가</th><th>베스트</th></tr></thead><tbody>';
  recent.forEach(r => {
    const best = getBestScore(r);
    html += `<tr><td>${fmtDate(r.date)}</td><td>${r.label||''}</td><td>${r.course}</td><td>${r.scores.length}명</td><td>${best}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('dashRecentRounds').innerHTML = html;
}

function getBestScore(round) {
  if (!round.scores || round.scores.length === 0) return '-';
  const sorted = [...round.scores].sort((a,b) => a.score - b.score);
  return sorted[0].name + ' (' + sorted[0].score + ')';
}

  document.getElementById('memberCount').textContent = '총 ' + DATA.members.length + '명';

      <td style="font-family:'JetBrains Mono',monospace">${m.avgScore != null ? m.avgScore : '-'}</td>

  });

}

function saveMember(editId) {
  const name = document.getElementById('mName').value.trim();
  if (!name) { showToast('이름을 입력하세요'); return; }
  const type = document.getElementById('mType').value;
  const hcVal = document.getElementById('mHandicap').value;
  const handicap = hcVal !== '' ? parseInt(hcVal) : null;
  const rounds = parseInt(document.getElementById('mRounds').value) || 0;
  const avgVal = document.getElementById('mAvg').value;
  const avgScore = avgVal !== '' ? parseFloat(avgVal) : null;

  if (editId) {
    const m = DATA.members.find(x => x.id === editId);
    if (m) { m.name = name; m.type = type; m.handicap = handicap; m.rounds = rounds; m.avgScore = avgScore; }
  } else {
    DATA.members.push({ id: nextId(DATA.members), name, type, handicap, rounds, avgScore });
  }
  saveData();
  renderAll();
  closeModal();
  showToast(editId ? '멤버가 수정되었습니다' : '멤버가 추가되었습니다');
}

function editMember(id) { openMemberModal(id); }

function deleteMember(id) {

function renderRounds() {
  const tbody = document.getElementById('roundTableBody');
  document.getElementById('roundCount').textContent = '총 ' + DATA.rounds.length + '회';

  const sorted = [...DATA.rounds].sort((a,b) => b.date.localeCompare(a.date));
  let html = '';
  if (sorted.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:24px">라운드 기록이 없습니다. 아직 기록이 없습니다.</td></tr>';
    return;
  }
  sorted.forEach(r => {
    const best = getBestScore(r);
    html += `<tr class="round-detail-row" onclick="showRoundDetail(${r.id})">
      <td>${fmtDate(r.date)}</td>
      <td>${r.label||''}</td>
      <td>${r.course}</td>
      <td>${r.scores.length}명</td>
      <td style="font-family:'JetBrains Mono',monospace">${best}</td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

function showRoundDetail(id) {
  const r = DATA.rounds.find(x => x.id === id);
  if (!r) return;
  const sorted = [...r.scores].sort((a,b) => a.score - b.score);
  let listHtml = '';
  sorted.forEach((s, i) => {
    let rankIcon = '';
    if (i === 0) rankIcon = '&#129351; ';
    else if (i === 1) rankIcon = '&#129352; ';
    else if (i === 2) rankIcon = '&#129353; ';
    listHtml += `<li><span>${rankIcon}${s.name}</span><span class="score-val">${s.score}</span></li>`;
  });

  const mc = document.getElementById('modalContainer');
  mc.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${r.label || fmtDate(r.date)} - ${r.course}</div>
          <button class="btn-icon" onclick="closeModal()">&times;</button>

function toggleScoreInput(mid) {
  const chk = document.getElementById('chk_' + mid);

  if (chk.checked) inp.focus();
}

function saveRound(editId) {
  const date = document.getElementById('rDate').value;
  const label = document.getElementById('rLabel').value.trim();
  const course = document.getElementById('rCourse').value.trim();
  if (!date || !course) { showToast('날짜와 골프장을 입력하세요'); return; }

  const scores = [];
  DATA.members.forEach(m => {
    const chk = document.getElementById('chk_' + m.id);
    const inp = document.getElementById('score_' + m.id);
    if (chk && chk.checked && inp.value) {
      scores.push({ name: m.name, score: parseInt(inp.value) });
    }
  });

  if (scores.length === 0) { showToast('최소 1명의 스코어를 입력하세요'); return; }

  if (editId) {
    const r = DATA.rounds.find(x => x.id === editId);
    if (r) { r.date = date; r.label = label; r.course = course; r.scores = scores; }
  } else {
    DATA.rounds.push({ id: nextId(DATA.rounds), date, label, course, scores });
  }
  saveData();
  renderAll();
  closeModal();
  showToast(editId ? '라운드가 수정되었습니다' : '라운드가 추가되었습니다');
}

function handleReceiptUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    pendingReceipt = e.target.result;
    const prev = document.getElementById('receiptPreview');
    if (prev) { prev.src = pendingReceipt; prev.style.display = 'block'; }
  };
  reader.readAsDataURL(file);
}

  if (editId) {
    const e = DATA.expenses.find(x => x.id === editId);
    if (e) { e.date = date; e.desc = desc; e.amount = amount; e.note = note; e.receipt = pendingReceipt; }
  } else {
    DATA.expenses.push({ id: nextId(DATA.expenses), date, desc, amount, note, receipt: pendingReceipt });
  }
  pendingReceipt = '';
  saveData();
  renderAll();

function renderAwards() {
  const container = document.getElementById('awardsContainer');
  if (!DATA.awards || DATA.awards.length === 0) {

  const sorted = [...DATA.awards].sort((a,b) => {
    let ai = monthOrder.indexOf(a.month);
    let bi = monthOrder.indexOf(b.month);

    if (bi === -1) bi = 99;
    return ai - bi;
  });

  let html = '';
  sorted.forEach(aw => {
    html += `<div class="awards-month-section">
      <div class="awards-month-title">${aw.month} ${isAdmin ? '<button class="btn btn-sm btn-secondary" style="margin-left:12px;font-size:12px" onclick="editAward('+aw.id+')">수정</button> <button class="btn btn-sm btn-danger" style="font-size:12px" onclick="deleteAward('+aw.id+')">삭제</button>' : ''}</div>

    aw.entries.forEach(e => {
      const icon = icons[e.category] || '&#127942;';
      html += `<div class="award-card">

function saveAward(editId) {
  const month = document.getElementById('awMonth').value.trim();
  if (!month) { showToast('월/시기를 입력하세요'); return; }

  const cats = document.querySelectorAll('.aw-cat');
  const wins = document.querySelectorAll('.aw-win');
  const entries = [];
  for (let i = 0; i < cats.length; i++) {
    const c = cats[i].value.trim();
    const w = wins[i].value.trim();
    if (c && w) entries.push({ category: c, winner: w });
  }
  if (entries.length === 0) { showToast('최소 1개 포상 항목을 입력하세요'); return; }

  if (editId) {
    const aw = DATA.awards.find(x => x.id === editId);
    if (aw) { aw.month = month; aw.entries = entries; }
  } else {
    DATA.awards.push({ id: nextId(DATA.awards), month, entries });
  }
  saveData();
  renderAll();
  closeModal();
  showToast(editId ? '포상이 수정되었습니다' : '포상이 추가되었습니다');
}

    <h3>제5조 (회원의 권리와 의무)</h3>

      <li>회원은 총회에 참석하여 의결권을 행사할 수 있다.</li>

      <li>회원은 회비를 납부할 의무가 있다.</li>

    </ol>

    <h3>제6조 (회원의 탈퇴 및 제명)</h3>

    </ol>

    <h2>제3장 임원</h2>

    <h3>제7조 (임원의 구성)</h3>
    <p>본 클럽은 다음의 임원을 둔다.</p>
    <ol>
      <li>회장 1명</li>
      <li>총무 1명</li>
      <li>서기 1명</li>
      <li>운영위원 3명</li>
    </ol>

    <h3>제8조 (임원의 선출)</h3>
    <p>임원은 총회에서 선출한다. 임기는 1년으로 하며 연임할 수 있다.</p>
    <p>초대 회장 이성재, 초대 총무 최영근, 초대 서기 전형건, 운영위원 : 배현준, 이지훈, 승용수</p>
    <p>회장의 선출은 당해년도 평균타수 상위 랭커 4명이 당해 마지막 월례회 회장타이틀 조에 편성되어 그 조 우승자로 결정한다</p>

      <li>총무는 클럽의 재정 및 행정 업무를 담당한다.</li>

    <ol>
      <li>게스트 포함 카트, 필드비, 운동전 점심비용, 그늘집 비용은 각 팀에서 1/N.</li>
      <li>각 라운딩의 저녁 비용은 회비로 지출한다.</li>
      <li>월별 사은품, 상금 등은 회비로 지출한다.</li>

    <p>2. 매월 포상</p>

      <li>롱기 1인</li>
      <li>니어 1인</li>
      <li>최다 버디 상</li>

    <p>3. 연말포상</p>
    <ul>
      <li>연중 최저 스코어 상(1위, 2위, 3위)</li>
      <li>연평균 최저 스코어 상(1위, 2위, 3위)</li>
      <li>최다 출석상(최다 출석자 전원)</li>
      <li>연간 최다 버디 상(1위, 2위, 3위)</li>
      <li>작년 연간 평균스코어 대비 올해 연간 평균스코어 가장 많이 감소한 사람(1위, 2위, 3위)</li>
    </ul>
    <p>4. 안양CC참가</p>

      <li>장덕수 회장님 매년 5~6월중 라운딩 초대 및 연평균 최저스코어 상위 7인 안양CC 라운딩 권한 부여(9월중)</li>
    </ul>

    <h3>제12조 (회계연도)</h3>
    <p>본 클럽의 회계연도는 매년 1월 1일부터 12월 31일까지로 한다.</p>

    <h2>제5장 보칙</h2>

    <h3>제13조 (정관 개정)</h3>
    <p>본 정관의 개정은 총회에서 회장 및 총무, 운영위원 3명의 만장일치하에 의결한다.</p>

    <h3>제14조 (시행세칙)</h3>
    <p>본 정관의 시행에 필요한 세부사항은 운영위원회에서 정한다.</p>

    <h3>제15조 (플레이룰)</h3>
    <ol>
      <li>NO 멀리건</li>
      <li>OB라인 말뚝 넘기면 공을 찾아도 죽은 것으로 카운트, 드라이버 OB인 경우 잠정구 또는 OB티에서 4th샷 중에 선택 가능. 세컨오비는 잠정구 플레이.</li>
      <li>나무/바위 등 자연 장애물로 인한 시야 방해 및 지형 라이 안 좋다고 빼고 치는 것 없으며 빼고 치는 것은 1벌타</li>
      <li>카트길(인드롭), 수리지, 인공장애물 등은 캐디 동의하에 무벌 드롭 인정</li>
      <li>디봇은 페어웨이에서만 뺄 수 있음. 러프에서는 불가. 벙커 발자국은 옮기는 것 가능</li>
      <li>온그린 시 그린 위에서 몇온 인지 미리 말해주기</li>
      <li>퍼팅 컨시드는 홀 주위 원에 조금이라도 걸치면 컨시드 OK 또는 홀컵에 퍼터 대가리 넣고 퍼터 그립(먹갈치)에 조금이라도 터치하면 OK</li>
      <li>클럽갯수 제한 14개</li>
    </ol>

    <h3>부칙</h3>
    <p>본 정관은 총회에서 의결한 날부터 시행한다.</p>
  `;
}

// ── Companion Matrix ──
function renderCompanion() {
  const container = document.getElementById('companionMatrix');
  const members = [...DATA.members].sort((a,b) => a.name.localeCompare(b.name, 'ko'));
  const names = members.map(m => m.name);

  if (DATA.rounds.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128101;</div><div class="empty-state-text">라운드 기록이 쌓이면 동반자 카운트가 자동 집계됩니다</div></div>';
    return;
  }

  // Build count matrix
  const matrix = {};
  names.forEach(n => { matrix[n] = {}; names.forEach(m => { matrix[n][m] = 0; }); });

  DATA.rounds.forEach(r => {
    const participants = r.scores.map(s => s.name);
    for (let i = 0; i < participants.length; i++) {
      for (let j = 0; j < participants.length; j++) {
        if (i !== j && matrix[participants[i]] && matrix[participants[i]][participants[j]] !== undefined) {
          matrix[participants[i]][participants[j]]++;
        }
      }
    }
  });

  // Find max for highlighting
  let maxCount = 0;
  names.forEach(a => names.forEach(b => { if (a !== b && matrix[a][b] > maxCount) maxCount = matrix[a][b]; }));

  // Build table
  let html = '<table class="companion-table"><thead><tr><th></th>';
  names.forEach(n => { html += `<th>${n.slice(0,1)}${n.slice(1,2)}</th>`; });
  html += '<th style="background:var(--gold-100)">합계</th></tr></thead><tbody>';

  names.forEach(row => {
    html += `<tr><th class="row-header">${row}</th>`;
    let rowTotal = 0;
    names.forEach(col => {
      if (row === col) {
        html += '<td class="self">-</td>';
      } else {
        const cnt = matrix[row][col];
        rowTotal += cnt;
        let cls = 'count';
        if (cnt > 0 && cnt >= maxCount) cls += ' count-high';
        html += `<td class="${cls}">${cnt || ''}</td>`;
      }
    });
    html += `<td class="total-col">${rowTotal}</td></tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ── Contacts ──
function renderContacts() {
  const tbody = document.getElementById('contactsTableBody');
  let html = '';
  DATA.contacts.forEach((c, i) => {
    html += `<tr>
      <td>${i + 1}</td>
      <td><div class="member-row"><div class="member-avatar" style="background:${getColor(c.name)}">${c.name.charAt(0)}</div>${c.name}</div></td>
      <td style="font-family:'JetBrains Mono',monospace">${c.phone}</td>
      <td><span class="badge ${c.note==='정회원'?'badge-green':'badge-gold'}">${c.note}</span></td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

// 먼저 localStorage에서 로드 (즉시 렌더링)
loadData();
renderAll();

// Supabase가 활성화되어 있으면 서버에서 최신 데이터를 가져와 덮어씀
if (SUPABASE_ENABLED) {
  (async () => {
    const cloudData = await loadDataFromSupabase();
    if (cloudData) {
      DATA = cloudData;
      saveDataLocal(); // 로컬도 동기화
      renderAll();
      showToast('서버에서 최신 데이터를 불러왔습니다');
    } else {
      // 서버에 데이터가 없으면 현재 로컬 데이터를 업로드
      await saveDataToSupabase();
      showToast('로컬 데이터를 서버에 업로드했습니다');
    }
  })();

  // 실시간 구독: 다른 사용자가 데이터를 변경하면 자동 반영
  supabase
    .channel('app_data_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'app_data' }, (payload) => {
      if (payload.new && payload.new.data && !_savingToSupabase) {
        DATA = payload.new.data;
        saveDataLocal();
        renderAll();
        showToast('다른 사용자가 데이터를 업데이트했습니다');
      }
    })
    .subscribe();
}
